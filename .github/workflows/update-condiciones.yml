name: Actualizar Condiciones

on:
  schedule:
    # Ejecutar cada 3 horas (UTC). Ajustar según necesidad.
    # 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00, 00:00 UTC
    # = 23:00, 02:00, 05:00, 08:00, 11:00, 14:00, 17:00, 20:00 (Chile UTC-4)
    - cron: '0 */3 * * *'

  # Permitir ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

jobs:
  actualizar-condiciones:
    runs-on: ubuntu-latest

    # Permisos para que el Action pueda hacer commit y push
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar script de recolección de condiciones
        run: python scripts/fetch_condiciones.py

      - name: Verificar que condiciones.json fue generado
        run: |
          if [ -f "data/condiciones.json" ]; then
            echo "✓ condiciones.json generado correctamente"
            cat data/condiciones.json
          else
            echo "✗ ERROR: condiciones.json no fue creado"
            exit 1
          fi

      - name: Commit y push del archivo actualizado
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/condiciones.json
          # Solo hace commit si hay cambios reales
          if git diff --staged --quiet; then
            echo "Sin cambios en condiciones.json, no se hace commit."
          else
            git commit -m "chore: actualizar condiciones [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
